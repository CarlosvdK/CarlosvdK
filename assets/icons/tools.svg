<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20">
  <g stroke="#4a8aff" stroke-width="1.3" fill="none" stroke-linecap="round">
    <!-- Wrench -->
    <path d="M4 16 L12 8" opacity="0.8"/>
    <circle cx="13" cy="7" r="3" opacity="0.6"/>
    <!-- Gear tooth accents -->
    <line x1="13" y1="3" x2="13" y2="4.5" stroke-width="1" opacity="0.5"/>
    <line x1="16.2" y1="7" x2="17" y2="7" stroke-width="1" opacity="0.5"/>
    <line x1="13" y1="9.5" x2="13" y2="11" stroke-width="1" opacity="0.5"/>
  </g>
  <circle cx="13" cy="7" r="1.2" fill="#4a8aff" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
