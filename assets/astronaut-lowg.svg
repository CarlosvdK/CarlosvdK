<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <defs>
    <filter id="agHelmet">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="agGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="agDust">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Transparent background — works on dark and light -->

  <!-- Drifting star particles -->
  <circle cx="50" cy="40" r="1.2" fill="#4a8aff" opacity="0.6">
    <animate attributeName="cx" values="50;580;50" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="25" r="0.8" fill="white" opacity="0.5">
    <animate attributeName="cx" values="150;620;150" dur="22s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="55" r="1.0" fill="#6ab0ff" opacity="0.4">
    <animate attributeName="cx" values="300;650;-50;300" dur="25s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.7;0.1;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="420" cy="18" r="0.9" fill="white" opacity="0.3">
    <animate attributeName="cx" values="420;700;-20;420" dur="20s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.1;0.3" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="520" cy="60" r="1.1" fill="#4a8aff" opacity="0.5">
    <animate attributeName="cx" values="520;700;-80;520" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="70" r="0.7" fill="#88bbff" opacity="0.4">
    <animate attributeName="cx" values="80;600;80" dur="24s" repeatCount="indefinite"/>
  </circle>

  <!-- Ground line — subtle surface -->
  <line x1="0" y1="175" x2="600" y2="175" stroke="#1a2a4a" stroke-width="1" opacity="0.4"/>
  <line x1="0" y1="176" x2="600" y2="176" stroke="#0d1520" stroke-width="0.5" opacity="0.3"/>

  <!-- Dust particles kicked up by footsteps -->
  <g opacity="0.5">
    <!-- Left foot dust -->
    <circle cx="0" cy="0" r="1.5" fill="#4a6a8a" filter="url(#agDust)">
      <animate attributeName="cx" values="270;268;275;270" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="174;168;172;174" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0.5;0.3;0" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1;1;2.5;3;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="1" fill="#3a5a7a" filter="url(#agDust)">
      <animate attributeName="cx" values="275;272;280;275" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="174;166;170;174" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0.4;0.2;0" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="r" values="0.8;0.8;2;2.5;0.8" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <!-- Right foot dust (offset timing) -->
    <circle cx="0" cy="0" r="1.5" fill="#4a6a8a" filter="url(#agDust)">
      <animate attributeName="cx" values="290;288;295;290" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="174;168;172;174" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0.5;0.3;0" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1;1;2.5;3;1" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ════════════════════════════════ -->
  <!--  ASTRONAUT — low gravity run    -->
  <!-- ════════════════════════════════ -->
  <g transform="translate(280, 100)">
    <!-- Main bounce: whole body floats up/down in slow low-g arc -->
    <animateTransform attributeName="transform" type="translate"
      values="280,115; 280,85; 280,115; 280,85; 280,115"
      dur="2.4s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.33 0 0.67 1; 0.33 0 0.67 1; 0.33 0 0.67 1; 0.33 0 0.67 1"/>

    <!-- Gentle forward-backward lean -->
    <animateTransform attributeName="transform" type="rotate"
      values="-8,0,0; 5,0,0; -8,0,0; 5,0,0; -8,0,0"
      dur="2.4s" repeatCount="indefinite" additive="sum" calcMode="spline"
      keySplines="0.33 0 0.67 1; 0.33 0 0.67 1; 0.33 0 0.67 1; 0.33 0 0.67 1"/>

    <!-- Backpack / life support -->
    <rect x="-14" y="-22" width="11" height="32" rx="3" fill="#b0b0b0" stroke="#888" stroke-width="0.8"/>
    <rect x="-13" y="-18" width="4" height="7" rx="1" fill="#999"/>
    <rect x="-13" y="-7" width="4" height="7" rx="1" fill="#999"/>
    <circle cx="-9" cy="14" r="2.2" fill="#555"/>

    <!-- Torso -->
    <rect x="-5" y="-20" width="22" height="30" rx="6" fill="#e0e0e0" stroke="#bbb" stroke-width="0.8"/>
    <!-- Chest panel -->
    <rect x="0" y="-15" width="12" height="10" rx="2" fill="#ccc"/>
    <rect x="2" y="-13" width="4" height="3.5" rx="0.5" fill="#4a8aff" opacity="0.9"/>
    <rect x="8" y="-13" width="4" height="3.5" rx="0.5" fill="#ff6644" opacity="0.8"/>
    <rect x="2" y="-7" width="10" height="2.5" rx="0.5" fill="#aaa"/>

    <!-- LEFT ARM — swings opposite to legs -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="25,-2,-8; -30,-2,-8; 25,-2,-8; -30,-2,-8; 25,-2,-8"
        dur="2.4s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.33 0 0.67 1; 0.33 0 0.67 1; 0.33 0 0.67 1; 0.33 0 0.67 1"/>
      <!-- Upper arm -->
      <rect x="-18" y="-16" width="14" height="8" rx="4" fill="#d8d8d8" stroke="#bbb" stroke-width="0.5" transform="rotate(-15, -5, -12)"/>
      <!-- Forearm -->
      <rect x="-26" y="-22" width="10" height="7" rx="3.5" fill="#d0d0d0" stroke="#bbb" stroke-width="0.4" transform="rotate(-25, -21, -18)"/>
      <!-- Glove -->
      <circle cx="-28" cy="-24" r="4" fill="#c8c8c8" stroke="#aaa" stroke-width="0.5"/>
    </g>

    <!-- RIGHT ARM — swings opposite -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="-25,18,-8; 30,18,-8; -25,18,-8; 30,18,-8; -25,18,-8"
        dur="2.4s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.33 0 0.67 1; 0.33 0 0.67 1; 0.33 0 0.67 1; 0.33 0 0.67 1"/>
      <rect x="18" y="-16" width="14" height="8" rx="4" fill="#d8d8d8" stroke="#bbb" stroke-width="0.5" transform="rotate(15, 22, -12)"/>
      <rect x="28" y="-22" width="10" height="7" rx="3.5" fill="#d0d0d0" stroke="#bbb" stroke-width="0.4" transform="rotate(25, 33, -18)"/>
      <circle cx="40" cy="-24" r="4" fill="#c8c8c8" stroke="#aaa" stroke-width="0.5"/>
    </g>

    <!-- LEFT LEG — running stride -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="-35,0,10; 30,0,10; -35,0,10; 30,0,10; -35,0,10"
        dur="2.4s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.33 0 0.67 1; 0.33 0 0.67 1; 0.33 0 0.67 1; 0.33 0 0.67 1"/>
      <!-- Thigh -->
      <rect x="-4" y="10" width="10" height="22" rx="5" fill="#d8d8d8" stroke="#bbb" stroke-width="0.5"/>
      <!-- Lower leg / shin -->
      <g>
        <animateTransform attributeName="transform" type="rotate"
          values="20,1,30; -10,1,30; 20,1,30; -10,1,30; 20,1,30"
          dur="2.4s" repeatCount="indefinite" calcMode="spline"
          keySplines="0.33 0 0.67 1; 0.33 0 0.67 1; 0.33 0 0.67 1; 0.33 0 0.67 1"/>
        <rect x="-3" y="30" width="9" height="18" rx="4.5" fill="#d0d0d0" stroke="#bbb" stroke-width="0.4"/>
        <!-- Boot -->
        <rect x="-5" y="45" width="12" height="7" rx="3.5" fill="#888" stroke="#666" stroke-width="0.5"/>
      </g>
    </g>

    <!-- RIGHT LEG — opposite phase -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="30,12,10; -35,12,10; 30,12,10; -35,12,10; 30,12,10"
        dur="2.4s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.33 0 0.67 1; 0.33 0 0.67 1; 0.33 0 0.67 1; 0.33 0 0.67 1"/>
      <rect x="8" y="10" width="10" height="22" rx="5" fill="#d8d8d8" stroke="#bbb" stroke-width="0.5"/>
      <g>
        <animateTransform attributeName="transform" type="rotate"
          values="-10,13,30; 20,13,30; -10,13,30; 20,13,30; -10,13,30"
          dur="2.4s" repeatCount="indefinite" calcMode="spline"
          keySplines="0.33 0 0.67 1; 0.33 0 0.67 1; 0.33 0 0.67 1; 0.33 0 0.67 1"/>
        <rect x="9" y="30" width="9" height="18" rx="4.5" fill="#d0d0d0" stroke="#bbb" stroke-width="0.4"/>
        <rect x="7" y="45" width="12" height="7" rx="3.5" fill="#888" stroke="#666" stroke-width="0.5"/>
      </g>
    </g>

    <!-- Helmet -->
    <circle cx="8" cy="-34" r="18" fill="#e0e0e0" stroke="#bbb" stroke-width="1"/>
    <!-- Visor -->
    <ellipse cx="13" cy="-35" rx="11" ry="10" fill="#0d2040" stroke="#1a3355" stroke-width="0.8"/>
    <!-- Visor reflections -->
    <ellipse cx="16" cy="-40" rx="5" ry="3" fill="#2a5a9a" opacity="0.35"/>
    <ellipse cx="10" cy="-32" rx="3.5" ry="2" fill="#1a4488" opacity="0.25"/>
    <!-- Helmet light — blue accent -->
    <circle cx="22" cy="-46" r="2.5" fill="#4a8aff" filter="url(#agGlow)" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Antenna nub -->
    <line x1="-4" y1="-48" x2="-4" y2="-54" stroke="#999" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="-4" cy="-55" r="1.5" fill="#4a8aff" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
