<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <!-- Glow filters -->
    <filter id="helmetGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Stars pattern (same as header) -->
    <pattern id="footerStars" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <rect width="200" height="200" fill="#000005"/>
      <circle cx="10" cy="15" r="0.8" fill="white" opacity="0.9"/>
      <circle cx="35" cy="42" r="1.2" fill="white" opacity="0.7"/>
      <circle cx="68" cy="8" r="0.6" fill="white" opacity="0.8"/>
      <circle cx="95" cy="55" r="1.0" fill="white" opacity="0.6"/>
      <circle cx="120" cy="22" r="0.7" fill="white" opacity="0.9"/>
      <circle cx="155" cy="78" r="0.9" fill="white" opacity="0.7"/>
      <circle cx="178" cy="33" r="0.6" fill="white" opacity="0.8"/>
      <circle cx="45" cy="90" r="1.1" fill="white" opacity="0.6"/>
      <circle cx="80" cy="130" r="0.8" fill="white" opacity="0.9"/>
      <circle cx="22" cy="160" r="0.7" fill="#ffffcc" opacity="0.8"/>
      <circle cx="140" cy="110" r="1.0" fill="white" opacity="0.7"/>
      <circle cx="165" cy="150" r="0.6" fill="white" opacity="0.9"/>
      <circle cx="55" cy="170" r="0.9" fill="#ccccff" opacity="0.7"/>
      <circle cx="110" cy="185" r="0.7" fill="white" opacity="0.8"/>
      <circle cx="190" cy="195" r="1.1" fill="white" opacity="0.6"/>
      <circle cx="5" cy="195" r="0.8" fill="white" opacity="0.9"/>
      <circle cx="75" cy="50" r="0.6" fill="#ffffcc" opacity="0.8"/>
      <circle cx="130" cy="170" r="0.9" fill="white" opacity="0.7"/>
      <circle cx="185" cy="65" r="0.7" fill="white" opacity="0.9"/>
      <circle cx="30" cy="120" r="1.2" fill="white" opacity="0.5"/>
      <!-- Twinkling stars -->
      <circle cx="15" cy="80" r="1.0" fill="white">
        <animate attributeName="opacity" values="0.9;0.2;0.9" dur="2.3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="100" cy="140" r="0.9" fill="#ccffff">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="170" cy="100" r="1.1" fill="white">
        <animate attributeName="opacity" values="0.8;0.1;0.8" dur="3.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="60" cy="190" r="0.8" fill="#ffffaa">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2.8s" repeatCount="indefinite"/>
      </circle>
    </pattern>
  </defs>

  <!-- Background starfield -->
  <rect width="900" height="200" fill="url(#footerStars)"/>

  <!-- ═══════════════════════════════ -->
  <!--     FLOATING ASTRONAUT         -->
  <!-- ═══════════════════════════════ -->
  <g transform="translate(450, 95)">
    <!-- Gentle floating animation — slow drift up/down + slight rotation -->
    <animateTransform attributeName="transform" type="translate"
      values="450,95; 450,85; 450,95; 450,100; 450,95"
      dur="8s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1"/>
    <animateTransform attributeName="transform" type="rotate"
      values="-3,0,0; 2,0,0; -3,0,0"
      dur="10s" repeatCount="indefinite" additive="sum" calcMode="spline"
      keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>

    <!-- Tether / safety line floating behind -->
    <path d="M -8,10 C -30,20 -50,5 -70,18 C -90,30 -100,12 -110,22"
      fill="none" stroke="#888888" stroke-width="1.5" opacity="0.5" stroke-linecap="round">
      <animate attributeName="d"
        values="M -8,10 C -30,20 -50,5 -70,18 C -90,30 -100,12 -110,22;
                M -8,10 C -25,12 -48,22 -68,14 C -88,6 -105,24 -115,18;
                M -8,10 C -30,20 -50,5 -70,18 C -90,30 -100,12 -110,22"
        dur="10s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
    </path>

    <!-- Backpack / life support -->
    <rect x="-12" y="-18" width="10" height="28" rx="3" fill="#cccccc" stroke="#999" stroke-width="0.8"/>
    <rect x="-11" y="-14" width="3" height="6" rx="1" fill="#aaa"/>
    <rect x="-11" y="-4" width="3" height="6" rx="1" fill="#aaa"/>
    <circle cx="-7" cy="14" r="2" fill="#666"/>

    <!-- Torso -->
    <rect x="-4" y="-16" width="20" height="26" rx="5" fill="#e8e8e8" stroke="#ccc" stroke-width="0.8"/>
    <!-- Chest detail -->
    <rect x="1" y="-12" width="10" height="8" rx="2" fill="#d0d0d0"/>
    <rect x="3" y="-10" width="3" height="3" rx="0.5" fill="#44aaff" opacity="0.8"/>
    <rect x="8" y="-10" width="3" height="3" rx="0.5" fill="#ff6644" opacity="0.8"/>
    <rect x="3" y="-5" width="8" height="2" rx="0.5" fill="#bbb"/>

    <!-- Left arm (reaching out) -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="15,0,-4; -5,0,-4; 15,0,-4"
        dur="7s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
      <rect x="-18" y="-14" width="16" height="8" rx="4" fill="#e0e0e0" stroke="#ccc" stroke-width="0.5" transform="rotate(-30, -4, -10)"/>
      <!-- Glove -->
      <circle cx="-22" cy="-20" r="4" fill="#d0d0d0" stroke="#bbb" stroke-width="0.5"/>
    </g>

    <!-- Right arm (relaxed) -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="-10,16,-4; 8,16,-4; -10,16,-4"
        dur="9s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
      <rect x="16" y="-12" width="16" height="8" rx="4" fill="#e0e0e0" stroke="#ccc" stroke-width="0.5" transform="rotate(25, 16, -8)"/>
      <!-- Glove -->
      <circle cx="36" cy="-16" r="4" fill="#d0d0d0" stroke="#bbb" stroke-width="0.5"/>
    </g>

    <!-- Left leg -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="5,2,10; -8,2,10; 5,2,10"
        dur="11s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
      <rect x="-2" y="10" width="9" height="20" rx="4" fill="#e0e0e0" stroke="#ccc" stroke-width="0.5"/>
      <!-- Boot -->
      <rect x="-3" y="27" width="11" height="6" rx="3" fill="#999" stroke="#777" stroke-width="0.5"/>
    </g>

    <!-- Right leg -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="-8,10,10; 5,10,10; -8,10,10"
        dur="9s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
      <rect x="9" y="10" width="9" height="20" rx="4" fill="#e0e0e0" stroke="#ccc" stroke-width="0.5"/>
      <!-- Boot -->
      <rect x="8" y="27" width="11" height="6" rx="3" fill="#999" stroke="#777" stroke-width="0.5"/>
    </g>

    <!-- Helmet -->
    <circle cx="8" cy="-28" r="16" fill="#e8e8e8" stroke="#ccc" stroke-width="1"/>
    <!-- Visor -->
    <ellipse cx="12" cy="-29" rx="10" ry="9" fill="#1a3355" stroke="#334466" stroke-width="0.8" opacity="0.95"/>
    <!-- Visor reflection -->
    <ellipse cx="15" cy="-33" rx="5" ry="3" fill="#3366aa" opacity="0.4"/>
    <ellipse cx="10" cy="-26" rx="3" ry="2" fill="#2255aa" opacity="0.25"/>
    <!-- Helmet light -->
    <circle cx="20" cy="-38" r="2" fill="#44ddff" filter="url(#helmetGlow)" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Subtle bottom text -->
  <text x="450" y="185" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="11"
    fill="#4a6a8a" opacity="0.6" letter-spacing="3">
    <animate attributeName="opacity" values="0.6;0.3;0.6" dur="4s" repeatCount="indefinite"/>
    FLOATING THROUGH THE COSMOS
  </text>
</svg>
