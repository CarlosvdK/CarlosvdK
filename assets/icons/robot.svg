<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20">
  <rect x="4" y="6" width="12" height="10" rx="2.5" fill="none" stroke="#4a8aff" stroke-width="1.2" opacity="0.7"/>
  <line x1="10" y1="3" x2="10" y2="6" stroke="#4a8aff" stroke-width="1" opacity="0.5"/>
  <circle cx="10" cy="2.5" r="1.2" fill="#4a8aff" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Eyes blink -->
  <circle cx="7.5" cy="10" r="1.5" fill="#4a8aff" opacity="0.8">
    <animate attributeName="ry" values="1.5;0.3;1.5" dur="3s" repeatCount="indefinite" keyTimes="0;0.05;0.1" calcMode="spline" keySplines="0.5 0 0.5 1;0.5 0 0.5 1"/>
  </circle>
  <circle cx="12.5" cy="10" r="1.5" fill="#4a8aff" opacity="0.8">
    <animate attributeName="ry" values="1.5;0.3;1.5" dur="3s" repeatCount="indefinite" keyTimes="0;0.05;0.1" calcMode="spline" keySplines="0.5 0 0.5 1;0.5 0 0.5 1"/>
  </circle>
  <line x1="7" y1="13.5" x2="13" y2="13.5" stroke="#4a8aff" stroke-width="0.8" opacity="0.4"/>
</svg>
