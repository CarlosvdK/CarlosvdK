<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20">
  <rect x="2" y="5" width="16" height="11" rx="2" fill="none" stroke="#4a8aff" stroke-width="1.2" opacity="0.7"/>
  <polyline points="2,5 10,11 18,5" fill="none" stroke="#4a8aff" stroke-width="1" opacity="0.6"/>
  <!-- New mail indicator -->
  <circle cx="16" cy="5" r="2.5" fill="#4a8aff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2.5;3;2.5" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
