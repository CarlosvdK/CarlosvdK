name: Generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?color_snake=#8a8a8a&color_dots=#161b22,#0c2d6b,#0d419d,#1158c7,#2f81f7
            dist/snake-dark.svg?palette=github-dark&color_snake=#aaaaaa&color_dots=#0d1117,#0c2d6b,#0d419d,#1158c7,#2f81f7

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
